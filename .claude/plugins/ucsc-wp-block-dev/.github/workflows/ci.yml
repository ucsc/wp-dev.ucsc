name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create venv and install deps
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r .claude/plugins/ucsc-wp-block-dev/requirements-dev.txt

      - name: Secret scan (grep)
        run: |
          set -euo pipefail
          if git ls-files | grep -E "token\.json" >/dev/null; then
            echo "Error: token.json file is tracked in git!"
            exit 1
          fi
          matches=$(git ls-files | grep -v "\.github/workflows/ci.yml" | xargs grep -I -n -E -e "-----BEGIN (RSA|PRIVATE) KEY|aws_secret_access_key|aws_access_key_id|BEGIN RSA PRIVATE KEY|(APP_PASS|PASSWORD|PRIVATE_KEY)\s*=" || true)
          if [ -n "$matches" ]; then
            echo "Secret-like strings found in repository:"
            echo "$matches"
            exit 1
          fi

      - name: Run tests
        env:
          CLAUDE_AVAILABLE: ${{ secrets.CLAUDE_AVAILABLE }}
        run: |
          source venv/bin/activate
          cd .claude/plugins/ucsc-wp-block-dev
          python -m pytest -q
